# Build output/dashboard.html and sync index.html for GitHub Pages.
# Triggered on dashboard pushes to main, via repository_dispatch from BDBV2026-Data,
# or manually.

name: Build dashboard

on:
  push:
    branches:
      - main
    paths-ignore:
      - "output/**"
      - "index.html"
  workflow_dispatch:
    inputs:
      data_repo_ref:
        description: "BDBV2026-Data git ref (branch, tag, or SHA). Leave empty for latest GitHub release."
        required: false
        default: ""
      linelist_repo_ref:
        description: "BDBV2026-Linelist_Processing git ref for dashboard_plots/. Default: main."
        required: false
        default: "main"
  repository_dispatch:
    types: [data-updated]

permissions:
  contents: write

concurrency:
  group: build-dashboard-${{ github.ref }}
  cancel-in-progress: true

env:
  DATA_REPO: INRB-UMIE/BDBV2026-Data
  LINELIST_REPO: INRB-UMIE/BDBV2026-Linelist_Processing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve refs
        id: refs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          resolve_latest_data_ref() {
            if release_json="$(gh release view --repo "${DATA_REPO}" --json targetCommitish,tagName 2>/dev/null)"; then
              ref="$(jq -r '.targetCommitish' <<< "${release_json}")"
              tag="$(jq -r '.tagName' <<< "${release_json}")"
              echo "Using latest ${DATA_REPO} release ${tag} @ ${ref}" >&2
              echo "${ref}"
              return
            fi
            echo "::warning::No GitHub release found on ${DATA_REPO}; falling back to main." >&2
            echo "main"
          }

          DASH_REF="${{ github.ref_name }}"
          DATA_REF=""
          LINELIST_REF="main"
          DATA_SOURCE="latest-release"

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            DATA_SOURCE="dispatch"
            if [ -n "${{ github.event.client_payload.dashboard_branch }}" ]; then
              DASH_REF="${{ github.event.client_payload.dashboard_branch }}"
            fi
            if [ -n "${{ github.event.client_payload.data_ref }}" ]; then
              DATA_REF="${{ github.event.client_payload.data_ref }}"
            elif [ -n "${{ github.event.client_payload.sha }}" ]; then
              DATA_REF="${{ github.event.client_payload.sha }}"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DATA_SOURCE="manual"
            if [ -n "${{ inputs.data_repo_ref }}" ]; then
              DATA_REF="${{ inputs.data_repo_ref }}"
            fi
            if [ -n "${{ inputs.linelist_repo_ref }}" ]; then
              LINELIST_REF="${{ inputs.linelist_repo_ref }}"
            fi
          else
            DATA_SOURCE="dashboard-push"
          fi

          if [ -z "${DATA_REF}" ]; then
            DATA_REF="$(resolve_latest_data_ref)"
          fi

          echo "dashboard_ref=${DASH_REF}" >> "$GITHUB_OUTPUT"
          echo "data_ref=${DATA_REF}" >> "$GITHUB_OUTPUT"
          echo "linelist_ref=${LINELIST_REF}" >> "$GITHUB_OUTPUT"
          echo "data_source=${DATA_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "Dashboard branch: ${DASH_REF}"
          echo "Data ref: ${DATA_REF}"
          echo "Linelist ref: ${LINELIST_REF}"

      - name: Checkout dashboard
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.refs.outputs.dashboard_ref }}
          lfs: true
          path: dashboard
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DATA_REPO }}
          ref: ${{ steps.refs.outputs.data_ref }}
          lfs: true
          path: BDBV2026-Data

      - name: Checkout linelist repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LINELIST_REPO }}
          ref: ${{ steps.refs.outputs.linelist_ref }}
          path: BDBV2026-Linelist_Processing
          token: ${{ secrets.EXTERNAL_REPO_TOKEN }}

      - name: Sync dashboard plots from linelist
        run: |
          set -euo pipefail
          src="${{ github.workspace }}/BDBV2026-Linelist_Processing/dashboard_plots"
          dest="${{ github.workspace }}/dashboard/Data/dashboard_plots"
          if [ ! -f "${src}/manifest.json" ]; then
            echo "::warning::No dashboard_plots/manifest.json in linelist repo; trends plots may be unavailable."
            exit 0
          fi
          rm -rf "${dest}"
          mkdir -p "${dest}"
          rsync -a --exclude='palette_options/' "${src}/" "${dest}/"
          echo "Synced dashboard plots:"
          ls -la "${dest}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dashboard/requirements.txt

      - name: Install dependencies
        run: pip install -r dashboard/requirements.txt

      - name: Build dashboard HTML
        working-directory: dashboard
        env:
          BUILD_DIR: ${{ github.workspace }}/BDBV2026-Data/build
          DATA_ROOT: ${{ github.workspace }}/dashboard/Data
        run: |
          set -euo pipefail
          python Scripts/build_dashboard_public.py
          cp output/dashboard.html index.html

      - name: Commit and push
        working-directory: dashboard
        env:
          DATA_REF: ${{ steps.refs.outputs.data_ref }}
          LINELIST_REF: ${{ steps.refs.outputs.linelist_ref }}
          DATA_REPO: ${{ env.DATA_REPO }}
          LINELIST_REPO: ${{ env.LINELIST_REPO }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/dashboard.html index.html
          if git diff --cached --quiet; then
            echo "No HTML changes to commit."
            exit 0
          fi
          git commit -m "CI: rebuild dashboard from ${DATA_REPO}@${DATA_REF} and ${LINELIST_REPO}@${LINELIST_REF}"
          git push origin "HEAD:${{ steps.refs.outputs.dashboard_ref }}"
